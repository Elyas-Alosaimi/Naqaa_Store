<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Naqaa Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="Css/style.css">
</head>
<body>

    <header>
        <div class="logo">
            <h1>Naqaa <span>Store</span></h1>
        </div>
        <nav>
            <ul>
                <li><a href="index.html"><i class="fas fa-arrow-left"></i> Return to Store</a></li>
                <li><button id="theme-toggle" class="theme-btn"><i class="fas fa-moon"></i></button></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="form-section">
            <h2>Admin Security Login</h2>
            <form id="loginForm">
                <label for="username">Username:</label>
                <input type="text" id="username" placeholder="Enter admin username" required>
                
                <label for="password">Password:</label>
                <input type="password" id="password" placeholder="Enter security password" required>
                
                <button type="submit" class="btn-primary" style="width: 100%; padding: 14px; font-size: 16px;">Secure Login</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Naqaa Cosmetics Store. All Rights Reserved. Prepared by Elyas and Team.</p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
