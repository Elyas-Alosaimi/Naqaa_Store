<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Product | Naqaa Store</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <div class="logo">
            <h1>Naqaa <span>Admin</span></h1>
        </div>
        <nav>
            <ul>
                <li><a href="view-admin.html"><i class="fas fa-arrow-left"></i> Cancel & Return</a></li>
                <li><button id="theme-toggle" class="theme-btn"><i class="fas fa-moon"></i></button></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="form-section">
            <h2>Edit Product Details</h2>
            <form id="editProductForm">
                <label for="editName">Product Name:</label>
                <input type="text" id="editName" required>
                
                <label for="editPrice">Price ($):</label>
                <input type="number" id="editPrice" min="1" required>
                
                <label for="editImage">Product Image URL:</label>
                <input type="url" id="editImage" required>
                
                <button type="submit" class="btn-edit" style="width: 100%; padding: 14px; font-size: 16px;">Save Changes & Update</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Naqaa Cosmetics Store. Admin Central Dashboard. Prepared by Elyas and Team.</p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
